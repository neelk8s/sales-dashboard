name: Sales Dashboard CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Create Sales Database
        run: python create_db.py

      - name: Verify database
        run: |
          python -c "
          import sqlite3
          conn = sqlite3.connect('sales.db')
          cursor = conn.cursor()
          cursor.execute('SELECT COUNT(*) FROM sales')
          count = cursor.fetchone()[0]
          print('Total records: ' + str(count))
          assert count >= 500
          print('Database verification passed!')
          conn.close()
          "

      - name: Verify products
        run: |
          python -c "
          import sqlite3
          conn = sqlite3.connect('sales.db')
          cursor = conn.cursor()
          cursor.execute('SELECT DISTINCT product FROM sales')
          products = [row[0] for row in cursor.fetchall()]
          print('Products found: ' + str(products))
          expected = ['Laptop', 'Phone', 'Tablet', 'Watch', 'Headphones']
          for p in expected:
              assert p in products
          print('All products verified!')
          conn.close()
          "

      - name: Verify regions
        run: |
          python -c "
          import sqlite3
          conn = sqlite3.connect('sales.db')
          cursor = conn.cursor()
          cursor.execute('SELECT DISTINCT region FROM sales')
          regions = [row[0] for row in cursor.fetchall()]
          print('Regions found: ' + str(regions))
          expected = ['North', 'South', 'East', 'West']
          for r in expected:
              assert r in regions
          print('All regions verified!')
          conn.close()
          "

      - name: Print Summary
        run: |
          python -c "
          import sqlite3
          conn = sqlite3.connect('sales.db')
          cursor = conn.cursor()
          cursor.execute('SELECT SUM(revenue) FROM sales')
          total = cursor.fetchone()[0]
          cursor.execute('SELECT COUNT(*) FROM sales')
          count = cursor.fetchone()[0]
          print('================================')
          print('Total Records : ' + str(count))
          print('Total Revenue : ' + str(round(total, 2)))
          print('Status        : All good!')
          print('================================')
          conn.close()
          "